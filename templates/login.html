{% extends 'base_admin.html' %}

{% block title %}Logowanie{% endblock %}

{% block content %}
  <h2>Logowanie pacjenta</h2>

  <div class="card">
    <div class="card-header">
      <p class="card-title">Dostęp do konta</p>
      <span class="badge">Pacjent</span>
    </div>

    <div class="card-body">
      <form method="post" action="{{ url_for('login') }}">
        <div class="form-group">
          <label for="identifier">Email lub PESEL</label>
          <input
            type="text"
            id="identifier"
            name="identifier"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Hasło</label>
          <input
            type="password"
            id="password"
            name="password"
            required
          >
        </div>

        <button type="submit" class="btn">Zaloguj</button>
      </form>
    </div>
  </div>

  <p style="margin-top: 12px;">
    Nie masz konta?
    <a href="{{ url_for('create_account') }}">Załóż konto</a>
  </p>
{% endblock %}
